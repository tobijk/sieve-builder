# Minimal Dovecot for local ManageSieve integration testing. NOT for production:
# plaintext auth, no TLS, mail under /tmp. Used by the integration test only.
log_path = /dev/stderr
ssl = no
disable_plaintext_auth = no
auth_mechanisms = plain scram-sha-1 scram-sha-256

first_valid_uid = 1000
mail_location = maildir:/tmp/mail/%u

passdb {
  driver = passwd-file
  args = scheme=PLAIN username_format=%u /etc/dovecot/users
}
userdb {
  driver = passwd-file
  args = username_format=%u /etc/dovecot/users
  default_fields = uid=1000 gid=1000 home=/tmp/mail/%u
}

protocols = sieve

service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

plugin {
  sieve = file:~/sieve;active=~/.dovecot.sieve
}
